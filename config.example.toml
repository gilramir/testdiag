# testdiag configuration.
#
# testdiag reads TWO config files in order; later files override earlier ones:
#
#   1. <workspace>/testdiag.toml   — project config, checked in with the repo
#                                    (workspace root = nearest ancestor with .git,
#                                    or TESTDIAG_WORKSPACE_ROOT if set)
#   2. ~/.config/testdiag/config.toml — user overrides (API keys, personal prefs)
#
# Both files accept every key documented below. Typically the workspace file
# holds LLM endpoints, stage assignments, and per-stage knobs, while the user
# file holds only api_key values and personal overrides.
#
# After both files are merged, TESTDIAG_* environment variables win over
# everything — handy for CI secrets.
#
# The pipeline is:
#   DOWNLOAD → LOGPARSE → FEEDBACK → HYPOTHESIZE → FEEDBACK →
#   [DEEPINSPECT → FEEDBACK] × N → SUMMARIZE → FEEDBACK
#
# You define LLMs once under [llms.<name>] and point each stage at one by name
# under [stages]. Only logparse and deepinspect are required; everything else
# falls back to the logparse LLM when unassigned.

[jenkins]
# Jenkins uses HTTP Basic auth with your username + a personal API token
# (Account > Configure > API Token), NOT your password.
#   env: TESTDIAG_JENKINS_USER, TESTDIAG_JENKINS_TOKEN
user      = "your-jenkins-username"
api_token = "your-jenkins-api-token"

# ---------------------------------------------------------------------------
# Named LLMs. Define as many as you like; each is any OpenAI-API-compatible
# endpoint (including a local server). Per-LLM secrets/overrides come from
#   TESTDIAG_LLM_<NAME>_API_KEY / _BASE_URL / _MODEL
# where <NAME> is the table name upper-cased (e.g. [llms.fast] -> ..._FAST_...).
# ---------------------------------------------------------------------------

[llms.fast]
# A cheaper/faster model: good enough to read the log, hypothesize, and summarize.
provider       = "openai"
base_url       = "http://localhost:1234/v1"
model          = "your-fast-model"
api_key        = ""            # often unused by local servers
context_window = 32768         # tokens; used to size how much log LOGPARSE inlines
temperature    = 0.0
max_tokens     = 4096

[llms.deep]
# A stronger model: traces source across boundaries to confirm or refute hypotheses.
provider       = "openai"
base_url       = "http://localhost:5678/v1"
model          = "your-strong-model"
api_key        = ""
context_window = 131072
temperature    = 0.0
max_tokens     = 4096

# ---------------------------------------------------------------------------
# Stage → LLM assignments.
#
# Every stage's LLM can be chosen independently. Each optional stage falls back
# to another stage's LLM when you don't assign it (shown below), so you only need
# to set the ones you want to differ.
#
# Required:
#   logparse    — reads the raw failure log, writes the investigation brief
#   deepinspect — gets ONLY the brief + one hypothesis + source tools; no raw log
#
# Optional (fallback in parentheses):
#   hypothesize             — reads the brief + architecture doc, produces hypotheses (-> logparse)
#   planinspection          — tool-using survey: finds the files DEEPINSPECT should read (-> deepinspect)
#   summarize               — summarizes each hypothesis and names the most likely root cause (-> logparse)
#   lessons                 — meta-analysis of the run for developers (-> logparse)
#   memorize                — distills durable codebase facts into .testdiag/memory.md (-> logparse)
#   logparse_feedback       — checks the LOGPARSE brief quality (-> logparse)
#   hypothesize_feedback    — checks the HYPOTHESIZE hypothesis list (-> hypothesize)
#   planinspection_feedback — checks each PLANINSPECTION plan (-> planinspection)
#   deepinspect_feedback    — checks each DEEPINSPECT result (-> deepinspect)
#   summarize_feedback      — checks the SUMMARIZE output (-> summarize)
#
# Stages that share the same endpoint and tool set reuse one proxy instance, so
# pointing multiple optional stages at "fast" costs nothing extra.
# ---------------------------------------------------------------------------

[stages]
logparse    = "fast"
deepinspect = "deep"
# hypothesize             = "fast"
# planinspection          = "deep"
# summarize               = "fast"
# lessons                 = "fast"
# memorize                = "fast"
# logparse_feedback       = "fast"
# hypothesize_feedback    = "fast"
# planinspection_feedback = "fast"
# deepinspect_feedback    = "fast"
# summarize_feedback      = "fast"

[proxy]
# Tool-call protocol normalization. Different open models (GPT-OSS, Gemma,
# Mistral, Nemotron, Llama 3.x) emit tool calls in their own native syntax;
# the proxy rewrites them into the form the agent parses and advertises the
# workspace tools to the model.
# Leave on unless your model already emits a recognized format
# (normalize_tool_calls=false) or your server rejects a tools array
# (inject_tools=false). DEEPINSPECT is advertised only the SOURCE tools; the
# raw-log tools are withheld so it works from the brief.
#   env: TESTDIAG_PROXY_NORMALIZE_TOOL_CALLS, TESTDIAG_PROXY_INJECT_TOOLS,
#        TESTDIAG_PROXY_DEBUG
normalize_tool_calls = true
inject_tools         = true
debug                = false   # also toggled by the --debug CLI flag

[workspace]
# The local checkout the Jenkins build ran against. Defaults to the current
# working directory when empty. TEST_AGENT.md is read from the root of this
# directory and added to every DEEPINSPECT prompt as background context.
#   env: TESTDIAG_WORKSPACE_ROOT
root = ""

# Optional: workspace-relative path to an architecture document. HYPOTHESIZE
# reads it to reason about which system components could have caused the
# failure. Leave empty to have HYPOTHESIZE work from the brief alone.
#   env: TESTDIAG_ARCHITECTURE_DOC
architecture_doc = ""   # e.g. "docs/architecture.md"

# Optional: path to an executable that maps a Jenkins test name to its
# workspace-relative source file. Called as:
#   <mapper> "<suite.ClassName.methodName>"
# Must print the source file path on stdout (e.g. "src/foo/FooTest.java").
# The subprocess runs with the workspace root as its working directory.
# When empty or the mapper returns nothing, DEEPINSPECT locates the file
# itself via the directory/grep tools.
#   env: TESTDIAG_MAPPER
mapper = ""   # e.g. "/usr/local/bin/my-test-mapper" or "scripts/map_test.sh"

[output]
#   env: TESTDIAG_OUTPUT_DIR
dir = "test-diagnosis"   # one Markdown report per failed test is written here

[stage_config]
# Per-stage tuning. Each *_max_feedbacks value controls how many times the
# FEEDBACK gate may reject that stage's output before the test is abandoned
# (for logparse/hypothesize/summarize) or the hypothesis is soft-failed
# (for deepinspect). Set to 0 to disable feedback for that stage entirely.
#
# Worst-case LLM calls per test (DEEPINSPECT only, excluding feedback):
#   N_hypotheses × (deepinspect_max_feedbacks + 1) × deepinspect_max_tool_iterations

#   env: TESTDIAG_LOGPARSE_MAX_FEEDBACKS
logparse_max_feedbacks         = 2

#   env: TESTDIAG_HYPOTHESIZE_MAX_FEEDBACKS
hypothesize_max_feedbacks      = 2

#   env: TESTDIAG_DEEPINSPECT_MAX_FEEDBACKS
deepinspect_max_feedbacks      = 1

# Tool calls allowed within one DEEPINSPECT attempt (one hypothesis, one try).
#   env: TESTDIAG_DEEPINSPECT_MAX_TOOL_ITERATIONS
deepinspect_max_tool_iterations = 50

#   env: TESTDIAG_SUMMARIZE_MAX_FEEDBACKS
summarize_max_feedbacks        = 2
